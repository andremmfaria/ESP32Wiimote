name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  validate-tag-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format and version match
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' is invalid. Use plain semver only (example: 1.5.0)."
            exit 1
          fi

          LIB_VERSION="$(grep -E '^version=' library.properties | head -n1 | cut -d'=' -f2 | tr -d '[:space:]')"
          if [[ -z "$LIB_VERSION" ]]; then
            echo "::error::Could not read 'version=' from library.properties."
            exit 1
          fi

          if [[ "$TAG" != "$LIB_VERSION" ]]; then
            echo "::error::Tag '$TAG' does not match library version '$LIB_VERSION'."
            exit 1
          fi

          echo "Tag and library version match: $TAG"

  release:
    runs-on: ubuntu-latest
    needs: validate-tag-version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true

  discover-examples:
    runs-on: ubuntu-latest
    needs: validate-tag-version

    outputs:
      examples: ${{ steps.collect.outputs.examples }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect example list
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t examples < <(find examples -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | sort)

          if [[ "${#examples[@]}" -eq 0 ]]; then
            echo "::error::No example directories found under examples/."
            exit 1
          fi

          json="$(printf '%s\n' "${examples[@]}" | jq -R . | jq -cs .)"
          echo "examples=$json" >> "$GITHUB_OUTPUT"

  build-examples:
    runs-on: ubuntu-latest
    needs: [validate-tag-version, discover-examples]

    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        example: ${{ fromJson(needs.discover-examples.outputs.examples) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Cache arduino-cli cores and libraries
        uses: actions/cache@v4
        with:
          path: ~/.arduino15
          key: arduino-${{ runner.os }}-esp32
          restore-keys: arduino-${{ runner.os }}-

      - name: Install ESP32 core
        run: |
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Build all examples
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.example }}"

          example_dir="examples/${{ matrix.example }}"
          sketch_path="$example_dir/${{ matrix.example }}.ino"

          if [[ ! -d "$example_dir" ]]; then
            echo "::error::Expected example directory '$example_dir' not found."
            exit 1
          fi

          if [[ ! -f "$sketch_path" ]]; then
            echo "::error::Expected sketch '$sketch_path' not found."
            exit 1
          fi

          echo "Compiling ${{ matrix.example }}"
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --library . \
            --output-dir "dist/${{ matrix.example }}" \
            "$example_dir"

      - name: Upload example artifact
        uses: actions/upload-artifact@v4
        with:
          name: example-${{ matrix.example }}
          path: dist/${{ matrix.example }}/
          if-no-files-found: error

  generate-openapi:
    runs-on: ubuntu-latest
    needs: validate-tag-version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate OpenAPI JSON artifact
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          cat > /tmp/export_openapi.cpp <<'CPP'
          #include "src/wifi/web_api_router.h"

          #include <cstdio>
          #include <cstring>

          int main() {
              WebApiContext ctx{};
              char buf[16384];
              std::memset(buf, 0, sizeof(buf));

              WebApiRouteResult result =
                  webApiRoute(&ctx, "GET", "/openapi.json", nullptr, nullptr, 0U, buf, sizeof(buf));

              if (result.httpStatus != 200 || std::strcmp(result.contentType, "application/json") != 0) {
                  std::fprintf(stderr,
                               "OpenAPI export failed (status=%d, contentType=%s)\n",
                               result.httpStatus,
                               result.contentType);
                  return 1;
              }

              std::printf("%s", buf);
              return 0;
          }
          CPP

          g++ -std=c++17 -I. -Isrc \
            /tmp/export_openapi.cpp \
            src/wifi/web_api_router.cpp \
            src/wifi/web_auth.cpp \
            src/wifi/web_event_stream.cpp \
            src/wifi/web_request_parser.cpp \
            src/wifi/web_response_serializer.cpp \
            src/wifi/web_command_queue.cpp \
            src/utils/command_dispatch_message_formatter.cpp \
            src/utils/command_dispatch_reason.cpp \
            src/wifi/web/index_html.cpp \
            src/wifi/web/app_js.cpp \
            src/wifi/web/styles_css.cpp \
            -o /tmp/export_openapi

          /tmp/export_openapi > dist/openapi.json

          if [[ ! -s dist/openapi.json ]]; then
            echo "::error::Generated dist/openapi.json is empty."
            exit 1
          fi

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-json
          path: dist/openapi.json
          if-no-files-found: error

  upload-assets:
    runs-on: ubuntu-latest
    needs: [release, build-examples, generate-openapi]

    steps:
      - name: Download example artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: example-*
          path: dist/examples

      - name: Download OpenAPI artifact
        uses: actions/download-artifact@v4
        with:
          name: openapi-json
          path: dist

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/examples/**/*.bin
            dist/openapi.json