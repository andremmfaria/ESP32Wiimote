name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  validate-tag-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate tag format and version match
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' is invalid. Use plain semver only (example: 1.5.0)."
            exit 1
          fi

          LIB_VERSION="$(grep -E '^version=' library.properties | head -n1 | cut -d'=' -f2 | tr -d '[:space:]')"
          if [[ -z "$LIB_VERSION" ]]; then
            echo "::error::Could not read 'version=' from library.properties."
            exit 1
          fi

          if [[ "$TAG" != "$LIB_VERSION" ]]; then
            echo "::error::Tag '$TAG' does not match library version '$LIB_VERSION'."
            exit 1
          fi

          echo "Tag and library version match: $TAG"

  release:
    runs-on: ubuntu-latest
    needs: validate-tag-version

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true

  compile-demo:
    runs-on: ubuntu-latest
    needs: [validate-tag-version, release]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Cache arduino-cli cores and libraries
        uses: actions/cache@v4
        with:
          path: ~/.arduino15
          key: arduino-${{ runner.os }}-esp32
          restore-keys: arduino-${{ runner.os }}-

      - name: Install ESP32 core
        run: |
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Build all examples
        run: |
          set -euo pipefail
          mkdir -p dist

          for example_dir in examples/*; do
            if [[ ! -d "$example_dir" ]]; then
              continue
            fi

            example_name="$(basename "$example_dir")"
            sketch_path="$example_dir/${example_name}.ino"

            if [[ ! -f "$sketch_path" ]]; then
              echo "::error::Expected sketch '$sketch_path' not found."
              exit 1
            fi

            echo "Compiling $example_name"
            arduino-cli compile \
              --fqbn esp32:esp32:esp32 \
              --library . \
              --output-dir "dist/${example_name}" \
              "$example_dir"
          done

      - name: Generate OpenAPI JSON artifact
        shell: bash
        run: |
          set -euo pipefail

          cat > /tmp/export_openapi.cpp <<'CPP'
          #include "src/wifi/web_api_router.h"

          #include <cstdio>
          #include <cstring>

          int main() {
              WebApiContext ctx{};
              char buf[16384];
              std::memset(buf, 0, sizeof(buf));

              WebApiRouteResult result =
                  webApiRoute(&ctx, "GET", "/openapi.json", nullptr, nullptr, 0U, buf, sizeof(buf));

              if (result.httpStatus != 200 || std::strcmp(result.contentType, "application/json") != 0) {
                  std::fprintf(stderr,
                               "OpenAPI export failed (status=%d, contentType=%s)\n",
                               result.httpStatus,
                               result.contentType);
                  return 1;
              }

              std::printf("%s", buf);
              return 0;
          }
          CPP

          g++ -std=c++17 -I. -Isrc \
            /tmp/export_openapi.cpp \
            src/wifi/web_api_router.cpp \
            src/wifi/web_auth.cpp \
            src/wifi/web_event_stream.cpp \
            src/wifi/web_request_parser.cpp \
            src/wifi/web_response_serializer.cpp \
            src/wifi/web_command_queue.cpp \
            -o /tmp/export_openapi

          /tmp/export_openapi > dist/openapi.json

          if [[ ! -s dist/openapi.json ]]; then
            echo "::error::Generated dist/openapi.json is empty."
            exit 1
          fi

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/**/*.bin
            dist/openapi.json