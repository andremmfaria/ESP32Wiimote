[platformio]
default_envs = native, esp32dev

; Native tests (run on PC, fast iteration)
[env:native]
platform = native
test_framework = unity
test_build_src = yes
test_filter = native/*
build_src_filter = 
    -<*>
    +<esp32wiimote/state/>
build_flags = 
    -std=c++11
    -DUNIT_TEST
    -DNATIVE_TEST
lib_compat_mode = off

; ESP32 tests (run on actual hardware)
[env:esp32dev]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
test_framework = unity
test_build_src = yes
test_speed = 115200
build_flags = 
    -std=c++11
    -DUNIT_TEST
lib_deps = 
monitor_speed = 115200

; ESP32 production build
[env:esp32dev-release]
platform = espressif32@6.5.0
board = esp32dev
framework = arduino
build_flags = 
    -std=c++11
lib_deps =
