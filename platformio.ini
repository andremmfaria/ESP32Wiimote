[platformio]
default_envs = esp32dev, native

; Native tests (run on PC, fast iteration)
[env:native]
platform = native
test_framework = unity
test_build_src = yes
test_filter = native/*
build_src_filter = 
    -<*>
    +<ESP32Wiimote.cpp>
    +<esp32wiimote/bt_controller.cpp>
    +<esp32wiimote/state/>
    +<esp32wiimote/data_parser.cpp>
    +<esp32wiimote/hci_callbacks.cpp>
    +<esp32wiimote/queue/hci_queue.cpp>
    +<utils/hci_codes.cpp>
    +<utils/protocol_codes.cpp>
    +<utils/serial_logging.cpp>
    +<tinywiimote/l2cap/l2cap_connection.cpp>
    +<tinywiimote/l2cap/l2cap_packets.cpp>
    +<tinywiimote/l2cap/l2cap_signaling.cpp>
    +<tinywiimote/hci/hci_commands.cpp>
    +<tinywiimote/hci/hci_events.cpp>
    +<tinywiimote/protocol/wiimote_protocol.cpp>
    +<tinywiimote/protocol/wiimote_extensions.cpp>
    +<tinywiimote/protocol/wiimote_reports.cpp>
    +<tinywiimote/protocol/wiimote_state.cpp>
    +<tinywiimote/utils/hci_utils.cpp>
    +<../test/mocks/test_mocks.cpp>
build_flags = 
    -std=c++11
    -DUNIT_TEST
    -DNATIVE_TEST
    -I test/mocks
lib_compat_mode = off

; Native coverage (line coverage with gcov/gcovr)
[env:native-coverage]
platform = native
test_framework = unity
test_build_src = yes
test_filter = native/*
build_src_filter = 
    -<*>
    +<ESP32Wiimote.cpp>
    +<esp32wiimote/bt_controller.cpp>
    +<esp32wiimote/state/>
    +<esp32wiimote/data_parser.cpp>
    +<esp32wiimote/hci_callbacks.cpp>
    +<esp32wiimote/queue/hci_queue.cpp>
    +<utils/hci_codes.cpp>
    +<utils/protocol_codes.cpp>
    +<utils/serial_logging.cpp>
    +<tinywiimote/l2cap/l2cap_connection.cpp>
    +<tinywiimote/l2cap/l2cap_packets.cpp>
    +<tinywiimote/l2cap/l2cap_signaling.cpp>
    +<tinywiimote/hci/hci_commands.cpp>
    +<tinywiimote/hci/hci_events.cpp>
    +<tinywiimote/protocol/wiimote_protocol.cpp>
    +<tinywiimote/protocol/wiimote_extensions.cpp>
    +<tinywiimote/protocol/wiimote_reports.cpp>
    +<tinywiimote/protocol/wiimote_state.cpp>
    +<tinywiimote/utils/hci_utils.cpp>
    +<../test/mocks/test_mocks.cpp>
build_flags = 
    -std=c++11
    -DUNIT_TEST
    -DNATIVE_TEST
    -I test/mocks
    -O0
    -g
    -fprofile-arcs
    -ftest-coverage
    -lgcov
lib_compat_mode = off

; ESP32 tests (run on actual hardware)
[env:esp32dev]
platform = espressif32@6.13.0
board = esp32dev
framework = arduino
test_framework = unity
test_build_src = yes
test_filter = embedded/*
test_speed = 115200
build_flags = 
    -std=c++11
    -DUNIT_TEST
lib_deps = 
monitor_speed = 115200

; ESP32 production build
[env:esp32dev-release]
platform = espressif32@6.13.0
board = esp32dev
framework = arduino
build_flags = 
    -std=c++11
lib_deps =
