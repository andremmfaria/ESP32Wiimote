[platformio]
default_envs = esp32dev, native

; Native tests (run on PC, fast iteration)
[env:native]
platform = native
test_framework = unity
test_build_src = yes
test_filter = native/*
build_src_filter = 
    -<*>
    +<esp32wiimote/state/>
    +<esp32wiimote/data_parser.cpp>
    +<tinywiimote/l2cap/l2cap_connection.cpp>
    +<tinywiimote/protocol/wiimote_protocol.cpp>
    +<tinywiimote/utils/hci_utils.cpp>
    +<../test/mocks/test_mocks.cpp>
build_flags = 
    -std=c++11
    -DUNIT_TEST
    -DNATIVE_TEST
    -I test/mocks
lib_compat_mode = off

; ESP32 tests (run on actual hardware)
[env:esp32dev]
platform = espressif32@6.13.0
board = esp32dev
framework = arduino
test_framework = unity
test_build_src = yes
test_filter = embedded/*
test_speed = 115200
build_flags = 
    -std=c++11
    -DUNIT_TEST
lib_deps = 
monitor_speed = 115200

; ESP32 production build
[env:esp32dev-release]
platform = espressif32@6.13.0
board = esp32dev
framework = arduino
build_flags = 
    -std=c++11
lib_deps =
